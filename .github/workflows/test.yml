name: test

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      promise: ${{ steps.filter.outputs.promise }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            promise:
              - 'postgresql-example/promise.yaml'
              - 'postgresql-example/promise-ha.yaml'
              - 'postgresql-example/resource-request.yaml'
              - 'postgresql-example/workflows/configure-pipeline/**'

  test:
    needs: changes
    if: needs.changes.outputs.promise == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Expose GitHub Runtime
        uses: crazy-max/ghaction-github-runtime@v4

      - name: Install kratix CLI
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
        run: |
          gh release download \
            --repo syntasso/kratix-cli \
            --pattern "kratix-cli_Linux_x86_64.tar.gz" \
            --output kratix-cli.tar.gz
          tar -xzf kratix-cli.tar.gz kratix
          sudo mv kratix /usr/local/bin/kratix

      - name: Install kratix-test plugin
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
        run: |
          LATEST=$(gh release list --repo syntasso/enterprise-releases --limit 100 \
            --json tagName,createdAt \
            --jq '. | sort_by(.createdAt) | reverse | map(select(.tagName | startswith("kratix-test"))) | .[0].tagName')
          gh release download "$LATEST" \
            --repo syntasso/enterprise-releases \
            --pattern "kratix-test_linux_amd64" \
            --output /usr/local/bin/kratix-test
          chmod +x /usr/local/bin/kratix-test

      - name: Run pipeline tests
        run: make test
        working-directory: postgresql-example

  system-test:
    needs: [changes, test]
    if: needs.changes.outputs.promise == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Expose GitHub Runtime
        uses: crazy-max/ghaction-github-runtime@v4

      - name: Install kind
        uses: helm/kind-action@v1
        with:
          install_only: true

      - name: Download latest Kratix
        run: git clone --depth 1 https://github.com/syntasso/kratix.git /tmp/kratix

      - name: Run Kratix quickstart
        run: /tmp/kratix/scripts/quick-start.sh
        timeout-minutes: 5

      - name: Build and load pipeline image
        run: make load-workflow
        working-directory: postgresql-example

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: postgresql-example/workflows/configure-pipeline/go.mod
          cache-dependency-path: postgresql-example/workflows/configure-pipeline/go.sum

      - name: Run system tests
        run: make system-test
        working-directory: postgresql-example
