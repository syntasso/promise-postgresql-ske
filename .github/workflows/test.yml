name: test

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - '**'
              - '.github/workflows/test.yml'
              - '!**/*.md'

  test:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Expose GitHub Runtime
        uses: crazy-max/ghaction-github-runtime@v4

      - name: Install kratix CLI
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
        run: |
          gh release download \
            --repo syntasso/kratix-cli \
            --pattern "kratix-cli_Linux_x86_64.tar.gz" \
            --output kratix-cli.tar.gz
          tar -xzf kratix-cli.tar.gz kratix
          sudo mv kratix /usr/local/bin/kratix

      - name: Install kratix-test plugin
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
        run: |
          LATEST=$(gh release list --repo syntasso/enterprise-releases --limit 100 \
            --json tagName,createdAt \
            --jq '. | sort_by(.createdAt) | reverse | map(select(.tagName | startswith("kratix-test"))) | .[0].tagName')
          gh release download "$LATEST" \
            --repo syntasso/enterprise-releases \
            --pattern "kratix-test_linux_amd64" \
            --output /usr/local/bin/kratix-test
          chmod +x /usr/local/bin/kratix-test

      - name: Run pipeline tests
        run: make test
        working-directory: workflows/configure-pipeline

  system-test:
    needs: [changes, test]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Expose GitHub Runtime
        uses: crazy-max/ghaction-github-runtime@v4

      - name: Install kind
        uses: helm/kind-action@v1
        with:
          install_only: true

      - name: Log in to ghcr.io
        run: echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u syntasso-pkg --password-stdin

      - name: Download latest Kratix
        run: git clone --depth 1 https://github.com/syntasso/kratix.git /tmp/kratix

      - name: Run Kratix quickstart
        run: /tmp/kratix/scripts/quick-start.sh
        timeout-minutes: 10

      - name: Deploy Flux to the platform cluster
        run: /tmp/kratix/scripts/register-destination --with-label environment=platform --context kind-platform --name platform-cluster

      - name: Install SKE Health Agent in the worker cluster
        run: |
          MINIO_IP=$(docker inspect platform-control-plane | yq ".[0].NetworkSettings.Networks.kind.IPAddress")
          helm repo add syntasso https://syntasso.github.io/helm-charts
          helm repo update
          kubectl --context kind-worker create secret docker-registry syntasso-registry \
            --namespace default \
            --docker-server=ghcr.io \
            --docker-username=syntasso-pkg \
            --docker-password=${{ secrets.GHCR_TOKEN }} \
            --dry-run=client -o yaml | kubectl --context kind-worker apply -f -
          helm install health-agent syntasso/k8s-health-agent \
            --kube-context kind-worker \
            --set skeLicense=${{ secrets.GHCR_TOKEN }} \
            --wait
          kubectl --context kind-worker create secret docker-registry syntasso-registry \
            --namespace k8s-health-agent-system \
            --docker-server=ghcr.io \
            --docker-username=syntasso-pkg \
            --docker-password=${{ secrets.GHCR_TOKEN }} \
            --dry-run=client -o yaml | kubectl --context kind-worker apply -f -
          sed "s/MINIO_ENDPOINT/${MINIO_IP}:31337/" test/resources/health-agent-config.yaml \
            | kubectl --context kind-worker apply -f -
          ACCESS_KEY=$(kubectl --context kind-platform get secret minio-credentials -n flux-system -o jsonpath='{.data.accesskey}' | base64 -d)
          SECRET_KEY=$(kubectl --context kind-platform get secret minio-credentials -n flux-system -o jsonpath='{.data.secretkey}' | base64 -d)
          kubectl --context kind-worker create secret generic minio-credentials \
            --namespace k8s-health-agent-system \
            --from-literal=accessKeyID="$ACCESS_KEY" \
            --from-literal=secretAccessKey="$SECRET_KEY"

      - name: Enable health records GitOps in the platform cluster
        run: kubectl --context kind-platform apply -f test/resources/worker-health-kustomization.yaml

      - name: Build and load pipeline image
        run: make load-workflow

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: workflows/configure-pipeline/go.mod
          cache-dependency-path: workflows/configure-pipeline/go.sum

      - name: Run system tests
        run: make system-test