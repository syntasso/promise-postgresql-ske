apiVersion: platform.kratix.io/v1alpha1
kind: Promise
metadata:
  name: ske-postgresql
  labels:
    kratix.io/promise-version: v0.0.0 # x-release-please-version
    kratix.io/backstage: "true" # Enable the promise to show up on Backstage
    kratix.io/cortex: "true" # Enable the promise to show up on Cortex
spec:
  api:
    apiVersion: apiextensions.k8s.io/v1
    kind: CustomResourceDefinition
    metadata:
      name: ske-postgresqls.marketplace.kratix.io
    spec:
      group: marketplace.kratix.io
      names:
        kind: ske-postgresql
        plural: ske-postgresqls
        singular: ske-postgresql
      scope: Namespaced
      versions:
        - name: v1alpha2
          schema:
            openAPIV3Schema:
              properties:
                spec:
                  properties:
                    backupEnabled:
                      default: false
                      type: boolean
                      description: |
                        Enables scheduled backups for the PostgreSQL instance.
                    dbName:
                      default: postgres
                      description: |
                        Database name. A database will be created with this name. The owner of the database will be the teamId.
                      type: string
                    env:
                      default: dev
                      description: |
                        Configures and deploys this PostgreSQL with environment specific configuration. Prod PostgreSQL are configured with backups and more resources.
                      pattern: ^(dev|prod)$
                      type: string
                    namespace:
                      default: default
                      description: |
                        Kubernetes namespace to create the Postgres cluster.
                      type: string
                    teamId:
                      default: acid
                      description: |
                        Team ID. A superuser role will be created with this name.
                      type: string
                  type: object
              type: object
          served: true
          storage: true
  destinationSelectors:
    - matchLabels:
        environment: dev
  workflows:
    promise:
      configure:
        - apiVersion: platform.kratix.io/v1alpha1
          kind: Pipeline
          metadata:
            name: promise-configure
            namespace: default
          spec:
            containers:
              - image: ghcr.io/syntasso/ske-promise-example-postgresql/postgresql-configure-pipeline:v0.0.0 # x-release-please-version
                name: postgresql-promise-pipeline
    resource:
      configure:
        - apiVersion: platform.kratix.io/v1alpha1
          kind: Pipeline
          metadata:
            name: instance-configure
            namespace: default
          spec:
            containers:
              - image: ghcr.io/syntasso/ske-promise-example-postgresql/postgresql-configure-pipeline:v0.0.0 # x-release-please-version
                name: postgresql-configure-pipeline
                env:
                - name: MINIMUM_REPLICAS
                  value: "3"
              - image: ghcr.io/syntasso/ske-promise-example-postgresql/postgresql-configure-pipeline:v0.0.0 # x-release-please-version
                name: deploy-health-definition
                command:
                  - /bin/sh
                  - -c
                args:
                  - |
                    python - <<'PY'
                    import kratix_sdk as ks
                    
                    sdk = ks.KratixSDK()
                    resource = sdk.read_resource_input()
                    
                    with open("/resources/references/postgresql-health-definition.yaml") as f:
                        template = f.read()
                    
                    content = (
                        template
                        .replace("${team}", resource.get_value("spec.teamId"))
                        .replace("${resourceName}", resource.get_name())
                        .replace("${namespace}", resource.get_namespace())
                        .replace("${promiseName}", resource.get_group_version_kind().kind)
                    )
                    
                    sdk.write_output("postgresql-health-definition.yaml", content.encode("utf-8"))
                    
                    print(f"Health definition written for {resource.get_name()} in {resource.get_namespace()}")
                    'PY'