name: release

on:
  push:
    branches: [main]

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      prerelease: ${{ steps.release.outputs.prerelease }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: .release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push multi-arch image
        run: make push-workflow TAG=${{ needs.release-please.outputs.tag_name }}

      - name: Tag image as latest
        if: ${{ !needs.release-please.outputs.prerelease }}
        run: |
          docker buildx imagetools create \
            --tag ghcr.io/syntasso/promise-postgresql-ske/postgresql-configure-pipeline:latest \
            ghcr.io/syntasso/promise-postgresql-ske/postgresql-configure-pipeline:${{ needs.release-please.outputs.tag_name }}
